# PostgreSQL 16 — base unique `lelanation_statistiques` (Drizzle, port hôte 5434).
# Usage : docker compose up -d   ou   make docker-db-up
# Migrations : make migrate-db (Drizzle)
services:
  postgres-statistiques:
    image: postgres:16-alpine
    container_name: lelanation-postgres-statistiques
    restart: unless-stopped
    environment:
      POSTGRES_USER: lelanation
      POSTGRES_PASSWORD: lelanation
      POSTGRES_DB: lelanation_statistiques
    ports:
      - "5434:5432"
    volumes:
      - lelanation_statistiques_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lelanation -d lelanation_statistiques"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  lelanation_statistiques_pgdata:
