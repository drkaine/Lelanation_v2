<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tauri + Vue + Typescript App</title>
  </head>

  <body>
    <div id="app"></div>
    <script>
      // Queue postMessage events that arrive before Vue mounts (Tauri + iframe).
      window.__LELANATION_IMPORT_QUEUE__ = [];
      window.addEventListener(
        "message",
        function (event) {
          var data = event.data;
          if (data && data.type === "lelanation:companion-import-build") {
            window.__LELANATION_IMPORT_QUEUE__.push({
              origin: event.origin,
              data: data,
            });
          }
        },
        true
      );
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
