name: Companion Windows Signed Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.4.0). Leave empty for dev build without release."
        required: false
        type: string
      sign:
        description: "Sign installer with code-signing certificate"
        required: false
        default: true
        type: boolean
  push:
    tags:
      - "v*"
      - "companion-v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build and Sign Windows Installer
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
        working-directory: companion-app
    env:
      SHOULD_SIGN: ${{ github.event_name == 'push' || inputs.sign }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        working-directory: .
        run: |
          $ver = ""
          if ("${{ inputs.version }}".Trim()) {
            $ver = "${{ inputs.version }}".Trim()
          } elseif ("${{ github.ref }}".StartsWith("refs/tags/")) {
            $ver = "${{ github.ref_name }}" -replace '^(companion-)?v', ''
          }
          if ($ver) {
            Write-Host "Release version: $ver"
            echo "value=$ver" >> $env:GITHUB_OUTPUT
            echo "is_release=true" >> $env:GITHUB_OUTPUT
          } else {
            $fallback = (Get-Content "companion-app\src-tauri\tauri.conf.json" | ConvertFrom-Json).version
            Write-Host "Dev build, using version from config: $fallback"
            echo "value=$fallback" >> $env:GITHUB_OUTPUT
            echo "is_release=false" >> $env:GITHUB_OUTPUT
          }

      - name: Inject version into config files
        if: steps.version.outputs.is_release == 'true'
        working-directory: .
        run: |
          $version = "${{ steps.version.outputs.value }}"
          # tauri.conf.json
          $tauriConf = "companion-app\src-tauri\tauri.conf.json"
          (Get-Content $tauriConf -Raw) -replace '"version":\s*"[^"]+"', "`"version`": `"$version`"" |
            Set-Content $tauriConf -NoNewline
          # Cargo.toml (only the package version at start of line, not dependency versions)
          $cargo = "companion-app\src-tauri\Cargo.toml"
          (Get-Content $cargo -Raw) -replace '(?m)^version\s*=\s*"[^"]+"', "version = `"$version`"" |
            Set-Content $cargo -NoNewline
          # package.json
          $pkg = "companion-app\package.json"
          (Get-Content $pkg -Raw) -replace '"version":\s*"[^"]+"', "`"version`": `"$version`"" |
            Set-Content $pkg -NoNewline
          Write-Host "All version files set to $version"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install workspace dependencies
        working-directory: .
        run: npm ci

      - name: Assert updater signing secrets present
        run: |
          if ("${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" -eq "") {
            throw "Missing secret TAURI_SIGNING_PRIVATE_KEY (required for updater signature and latest.json)."
          }
          Write-Host "TAURI_SIGNING_PRIVATE_KEY is configured."

      - name: Copy shared icons to companion-app public
        working-directory: .
        run: |
          $src = Join-Path $PWD "packages\shared-theme\icons"
          $dst = Join-Path $PWD "companion-app\public\icons"
          if (Test-Path $dst) { Remove-Item -Recurse -Force $dst }
          Copy-Item -Path $src -Destination $dst -Recurse -Force
          Write-Host "Copied shared icons to $dst"

      - name: Build Tauri Windows bundle
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build

      - name: Assert signing secrets present
        if: env.SHOULD_SIGN == 'true'
        run: |
          if ("${{ secrets.WINDOWS_CODESIGN_PFX_B64 }}" -eq "") {
            throw "Missing secret WINDOWS_CODESIGN_PFX_B64"
          }
          if ("${{ secrets.WINDOWS_CODESIGN_PASSWORD }}" -eq "") {
            throw "Missing secret WINDOWS_CODESIGN_PASSWORD"
          }

      - name: Import signing certificate
        if: env.SHOULD_SIGN == 'true'
        run: |
          $pfxPath = Join-Path $env:RUNNER_TEMP "codesign.pfx"
          [System.IO.File]::WriteAllBytes($pfxPath, [System.Convert]::FromBase64String("${{ secrets.WINDOWS_CODESIGN_PFX_B64 }}"))
          echo "PFX_PATH=$pfxPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Locate signtool.exe
        if: env.SHOULD_SIGN == 'true'
        shell: pwsh
        run: |
          $sdkRoot = "C:\Program Files (x86)\Windows Kits\10\bin"
          $signtool = Get-ChildItem -Path $sdkRoot -Recurse -Filter "signtool.exe" -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match "x64" } |
            Sort-Object { $_.Directory.Name } -Descending |
            Select-Object -First 1
          if (!$signtool) { throw "signtool.exe not found under $sdkRoot" }
          $dir = $signtool.DirectoryName
          Write-Host "Found signtool at $dir"
          echo "$dir" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Sign all Windows bundles (.exe/.msi)
        if: env.SHOULD_SIGN == 'true'
        run: |
          $bundleRoot = Join-Path $PWD "src-tauri\target\release\bundle"
          if (!(Test-Path $bundleRoot)) {
            throw "Bundle directory not found: $bundleRoot"
          }

          $filesToSign = Get-ChildItem -Path $bundleRoot -Recurse -File | Where-Object { $_.Extension -in ".exe", ".msi" }
          if ($filesToSign.Count -eq 0) {
            throw "No .exe/.msi files found to sign in $bundleRoot"
          }

          foreach ($file in $filesToSign) {
            Write-Host "Signing $($file.FullName)"
            & signtool sign `
              /f "$env:PFX_PATH" `
              /p "${{ secrets.WINDOWS_CODESIGN_PASSWORD }}" `
              /fd SHA256 `
              /td SHA256 `
              /tr "http://timestamp.digicert.com" `
              /d "Lelanation Companion" `
              "$($file.FullName)"

            if ($LASTEXITCODE -ne 0) {
              throw "signtool failed for $($file.FullName)"
            }
          }

      - name: Verify Authenticode signature
        if: env.SHOULD_SIGN == 'true'
        run: |
          $bundleRoot = Join-Path $PWD "src-tauri\target\release\bundle"
          $signedFiles = Get-ChildItem -Path $bundleRoot -Recurse -File | Where-Object { $_.Extension -in ".exe", ".msi" }
          foreach ($file in $signedFiles) {
            $sig = Get-AuthenticodeSignature -FilePath $file.FullName
            Write-Host "$($file.Name): $($sig.Status)"
            if ($sig.Status -eq "NotSigned") {
              throw "File is not signed: $($file.FullName)"
            }
            if ($sig.Status -ne "Valid") {
              $msg = "Authenticode status '$($sig.Status)' on $($file.Name) — signed but not CA-trusted (self-signed OK for dev). SmartScreen may still warn users."
              Write-Warning $msg
              Write-Host "::warning title=Authenticode not CA-trusted::$msg"
            }
            Write-Host "  -> Signer: $($sig.SignerCertificate.Subject)"
          }

      # Authenticode signing changes the installer bytes; regenerate minisign .sig for the updater.
      - name: Regenerate Tauri updater minisign signatures
        if: steps.version.outputs.is_release == 'true' && env.SHOULD_SIGN == 'true'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          $nsisDir = Join-Path $PWD "src-tauri\target\release\bundle\nsis"
          $setupExe = Get-ChildItem -Path $nsisDir -File | Where-Object { $_.Name -like "*-setup.exe" } | Select-Object -First 1
          if (!$setupExe) {
            throw "NSIS setup.exe not found under $nsisDir"
          }
          Write-Host "Re-signing updater bundle after Authenticode: $($setupExe.FullName)"
          npm run tauri -- signer sign $setupExe.FullName

          $nsisZip = Get-ChildItem -Path $nsisDir -File | Where-Object { $_.Name -like "*.nsis.zip" } | Select-Object -First 1
          if ($nsisZip) {
            Write-Host "Re-signing v1Compatible updater bundle: $($nsisZip.FullName)"
            npm run tauri -- signer sign $nsisZip.FullName
          }

      - name: Collect signed installer and updater bundle
        run: |
          $nsisDir = Join-Path $PWD "src-tauri\target\release\bundle\nsis"
          if (!(Test-Path $nsisDir)) {
            throw "NSIS output folder not found: $nsisDir"
          }

          Write-Host "NSIS bundle contents:"
          Get-ChildItem -Path $nsisDir -File | ForEach-Object { Write-Host "  $($_.Name)" }

          $destDir = Join-Path $env:GITHUB_WORKSPACE "installer"
          New-Item -ItemType Directory -Force -Path $destDir | Out-Null

          $installer = Get-ChildItem -Path $nsisDir -File | Where-Object { $_.Name -like "*-setup.exe" } | Select-Object -First 1
          if (!$installer) {
            $installer = Get-ChildItem -Path $nsisDir -File | Where-Object { $_.Extension -eq ".exe" } | Select-Object -First 1
          }
          if (!$installer) {
            throw "No NSIS installer .exe found in $nsisDir"
          }
          $dest = Join-Path $destDir "Lelanation.exe"
          Copy-Item -Path $installer.FullName -Destination $dest -Force
          Write-Host "Installer exported to $dest"

          # Tauri v2 (createUpdaterArtifacts: true) → *-setup.exe + *-setup.exe.sig
          $updaterSig = Get-ChildItem -Path $nsisDir -File | Where-Object { $_.Name -like "*-setup.exe.sig" } | Select-Object -First 1
          $updaterAssetName = "Lelanation.exe"

          # v1Compatible fallback → *.nsis.zip + *.nsis.zip.sig
          $nsisZip = Get-ChildItem -Path $nsisDir -File | Where-Object { $_.Name -like "*.nsis.zip" } | Select-Object -First 1
          $nsisZipSig = Get-ChildItem -Path $nsisDir -File | Where-Object { $_.Name -like "*.nsis.zip.sig" } | Select-Object -First 1
          if ($nsisZip -and $nsisZipSig) {
            Copy-Item -Path $nsisZip.FullName -Destination (Join-Path $destDir $nsisZip.Name) -Force
            $updaterSig = $nsisZipSig
            $updaterAssetName = $nsisZip.Name
            Write-Host "Updater bundle (v1Compatible): $($nsisZip.Name)"
          } elseif ($updaterSig) {
            Write-Host "Updater bundle (Tauri v2): $($installer.Name) → release asset Lelanation.exe"
          } else {
            Write-Host "WARN: No updater signature file found yet."
          }

          if ($updaterSig) {
            $sig = (Get-Content -Path $updaterSig.FullName -Raw).Trim()
            Add-Content -Path $env:GITHUB_ENV -Value "UPDATER_ASSET_NAME=$updaterAssetName"
            Add-Content -Path $env:GITHUB_ENV -Value "UPDATER_SIGNATURE<<EOF"
            Add-Content -Path $env:GITHUB_ENV -Value $sig
            Add-Content -Path $env:GITHUB_ENV -Value "EOF"
            Write-Host "Updater signature captured from $($updaterSig.Name)"
          }

      - name: Verify release installer Authenticode signature
        if: steps.version.outputs.is_release == 'true'
        run: |
          if ("${{ env.SHOULD_SIGN }}" -ne "true") {
            throw "Release builds must be signed (enable sign=true or push a companion-v* tag with WINDOWS_CODESIGN_PFX_B64 configured)."
          }
          $dest = Join-Path $env:GITHUB_WORKSPACE "installer\Lelanation.exe"
          if (!(Test-Path $dest)) {
            throw "Release installer not found at $dest"
          }
          $sig = Get-AuthenticodeSignature -FilePath $dest
          Write-Host "Release installer signature: $($sig.Status)"
          Write-Host "Signer: $($sig.SignerCertificate.Subject)"
          if ($sig.Status -eq "NotSigned") {
            throw "Release installer is not signed. Configure WINDOWS_CODESIGN_PFX_B64 (self-signed or CA-issued PFX)."
          }
          if ($sig.Status -eq "Valid") {
            Write-Host "Release installer has a CA-trusted Authenticode signature."
          } else {
            $msg = @"
          Release installer signature status is '$($sig.Status)' (not CA-trusted).
          Publishing anyway — self-signed certs show the signer name but Windows/SmartScreen may still display 'Unknown publisher'.
          For a trusted publisher without warnings, use an EV code signing certificate (see companion-app/CODE_SIGNING_WINDOWS.md).
          "@
            Write-Warning $msg
            Write-Host "::warning title=Self-signed / untrusted Authenticode::$($msg -replace '\s+', ' ')"
          }

      - name: Generate latest.json for auto-updater
        if: steps.version.outputs.is_release == 'true'
        run: |
          $version = "${{ steps.version.outputs.value }}"
          $tag = "companion-v$version"
          $sig = $env:UPDATER_SIGNATURE
          $assetName = $env:UPDATER_ASSET_NAME

          if (-not $sig -or -not $assetName) {
            throw @"
          Cannot generate latest.json: missing Tauri updater signature.
          Expected *-setup.exe.sig (createUpdaterArtifacts: true) or *.nsis.zip.sig (v1Compatible).
          Ensure TAURI_SIGNING_PRIVATE_KEY is set and matches pubkey in tauri.conf.json.
          "@
          }

          $url = "https://github.com/drkaine/Lelanation_v2/releases/download/$tag/$assetName"
          $pubDate = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")

          $json = @{
            version = $version
            notes = "Lelanation Companion v$version"
            pub_date = $pubDate
            platforms = @{
              "windows-x86_64" = @{
                signature = $sig.Trim()
                url = $url
              }
            }
          } | ConvertTo-Json -Depth 4

          $destDir = Join-Path $env:GITHUB_WORKSPACE "installer"
          $json | Set-Content (Join-Path $destDir "latest.json") -Encoding UTF8
          Write-Host "latest.json generated (updater asset: $assetName)"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: lelanation-windows-installer
          path: |
            installer/Lelanation.exe
            installer/latest.json
            installer/*.nsis.zip
          if-no-files-found: warn

      - name: Create tag and publish GitHub Release
        if: steps.version.outputs.is_release == 'true' && env.SHOULD_SIGN == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: .
        run: |
          $version = "${{ steps.version.outputs.value }}"
          $tag = "companion-v$version"

          $existingTag = git tag -l $tag 2>$null
          if (-not $existingTag) {
            git tag $tag
            git push origin $tag
            Write-Host "Created and pushed tag $tag"
          } else {
            Write-Host "Tag $tag already exists"
          }

          $assets = @("installer/Lelanation.exe")
          if (Test-Path "installer/latest.json") { $assets += "installer/latest.json" }
          $nsisZip = Get-ChildItem "installer" -Filter "*.nsis.zip" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($nsisZip) { $assets += $nsisZip.FullName }

          gh release create $tag @assets `
            --title "Lelanation Companion v$version" `
            --generate-notes
          Write-Host "Published release $tag"
